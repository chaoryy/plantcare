name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Check backend exists
        run: |
          if [ -f "./backend/package.json" ]; then
            cd backend
            npm ci
            npm audit --audit-level=high
          else
            echo "Backend not ready yet, skipping audit"
          fi

      - name: Build Docker image
        run: |
          if [ -f "./backend/Dockerfile" ]; then
            docker build -t plantcare ./backend
          else
            echo "Dockerfile not in backend yet, skipping"
          fi
